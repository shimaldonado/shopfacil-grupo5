<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopFácil — Catálogo</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="logo">🛒 ShopFácil</a>
    <div class="nav-links">
      <span id="nav-usuario" style="color:white; font-size:14px;"></span>
      <a href="login.html" id="btn-login">Iniciar sesión</a>
      <a href="agregar-producto.html" id="btn-agregar" style="display:none">+ Agregar producto</a>
      <a href="#" id="btn-logout" onclick="cerrarSesion()" style="display:none">Cerrar sesión</a>
    </div>
  </nav>

  <!-- Contenido principal -->
  <div class="container">
    <h2 style="margin-bottom: 8px;">Catálogo de productos</h2>

    <!-- Buscador -->
    <input
      type="text"
      id="buscador"
      placeholder="🔍 Buscar producto..."
      oninput="filtrar()"
      style="padding:10px 14px; border:1px solid #ddd; border-radius:6px; width:100%; max-width:400px; font-size:14px; margin-bottom:20px;"
    >

    <!-- Grid de productos -->
    <div id="catalogo" class="catalogo-grid">
      <p>Cargando productos...</p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/catalogo.js"></script>
</body>
</html>
