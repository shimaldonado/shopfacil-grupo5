<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agregar producto — ShopFácil</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="logo">🛒 ShopFácil</a>
    <div class="nav-links">
      <a href="index.html">Ver catálogo</a>
      <a href="#" onclick="cerrarSesion()">Cerrar sesión</a>
    </div>
  </nav>

  <!-- Formulario -->
  <div class="form-card" style="max-width:520px;">
    <h2>Agregar producto</h2>

    <div id="mensaje" class="mensaje"></div>

    <div class="form-group">
      <label>Nombre del producto</label>
      <input type="text" id="nombre" placeholder="Ej: Camisa Azul">
    </div>

    <div class="form-group">
      <label>Descripción</label>
      <textarea id="descripcion" placeholder="Descripción del producto..."
        style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;min-height:80px;"></textarea>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group">
        <label>Precio ($)</label>
        <input type="number" id="precio" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Stock (unidades)</label>
        <input type="number" id="stock" placeholder="0" min="0">
      </div>
    </div>

    <div class="form-group">
      <label>URL de imagen (opcional)</label>
      <input type="text" id="imagen" placeholder="https://...">
    </div>

    <button class="btn" onclick="agregarProducto()">Guardar producto</button>

    <div class="form-link">
      <a href="index.html">← Volver al catálogo</a>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/productos.js"></script>
</body>
</html>
