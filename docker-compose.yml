
services:

  # Base de datos MySQL
  db:
    image: mysql:8
    container_name: shopfacil_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: shopfacil
    ports:
      - "3306:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

  # Backend Node.js
  backend:
    build: ./backend
    container_name: shopfacil_backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: shopfacil
      JWT_SECRET: shopfacil_secret_2026
      PORT: 3000
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  db_data: